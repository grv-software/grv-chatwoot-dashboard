[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/auth-settings"
  to = "/.netlify/functions/auth-settings"
  status = 200
  force = true

[[redirects]]
  from = "/api/config"
  to = "/.netlify/functions/config"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "https://nxticket.com.br/api/:splat"
  status = 200
  force = true
