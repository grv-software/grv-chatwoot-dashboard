function renderAbaAtividades(c) {
  const pbs  = c.ativPlaybooks || [];
  const _hoje = new Date(); _hoje.setHours(0,0,0,0);

  // Garante seleção válida
  if (!_pb_sel_id || !pbs.find(function(p){return p.id===_pb_sel_id;})) {
    _pb_sel_id = pbs.length > 0 ? pbs[0].id : null;
  }
  const selPb = pbs.find(function(p){return p.id===_pb_sel_id;}) || null;

  // ── Coluna esquerda: lista de playbooks ──────────────
  const pbCards = pbs.map(function(pb) {
    const total   = (pb.atividades||[]).length;
    const done    = (pb.atividades||[]).filter(function(a){return a.status==='concluida';}).length;
    const venc    = (pb.atividades||[]).filter(function(a){
      const dl = a.dataLimite ? new Date(a.dataLimite+'T00:00:00') : null;
      return dl && dl < _hoje && a.status !== 'concluida';
    }).length;
    const pct     = total ? Math.round(done/total*100) : 0;
    const isSel   = pb.id === _pb_sel_id;
    return `<div class="at-pb-card${isSel?' sel':''}" onclick="selecionarPb('${pb.id}','${c.id}')">
      <div class="at-pb-card-name">${pb.nome}</div>
      <div class="at-pb-card-meta">${total} atividade${total!==1?'s':''} · ${done} concluída${done!==1?'s':''}${venc>0?' · <span style="color:var(--red);font-weight:700">'+venc+' vencida'+(venc>1?'s':'')+'</span>':''}</div>
      <div class="at-pb-bar"><div class="at-pb-bar-fill${pct===100?' done':''}" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');

  const newPbFormHtml = _pb_form_open
    ? `<div class="pb-inline-form">
        <input class="pb-inline-input" id="pb-nome-input" placeholder="Nome do playbook..." onkeydown="if(event.key==='Enter')criarAtivPlaybook('${c.id}')">
        <button class="btn btn-primary btn-sm" onclick="criarAtivPlaybook('${c.id}')">Criar</button>
        <button class="btn btn-sm" onclick="cancelarFormPlaybook('${c.id}')">✕</button>
       </div>`
    : `<button class="pb-add-btn" onclick="abrirFormPlaybook('${c.id}')">+ Novo Playbook</button>`;

  const leftHtml = `
    <div class="at-left-label">PLAYBOOKS</div>
    ${pbCards}
    ${!pbs.length ? '<div style="padding:20px;text-align:center;color:var(--text4);font-size:12px">Nenhum playbook ainda.</div>' : ''}
    ${newPbFormHtml}`;

  // ── Coluna direita: atividades do playbook selecionado ──
  let rightHtml = '';
  if (!selPb) {
    rightHtml = `<div class="at-empty" style="height:300px"><div style="font-size:28px">📋</div><div>Selecione um playbook à esquerda.</div></div>`;
  } else {
    const stLbl = {concluida:'Concluída',atrasada:'Atrasada',pendente:'Pendente',em_andamento:'Em andamento'};
    const ativs = selPb.atividades || [];

    const rowsHtml = ativs.map(function(at) {
      const done  = at.status === 'concluida';
      const dl    = at.dataLimite ? new Date(at.dataLimite+'T00:00:00') : null;
      const late  = dl && dl < _hoje && !done;
      const diasR = dl ? Math.round((dl - _hoje)/864e5) : null;
      const prox  = dl && !late && !done && diasR <= 7;
      const st    = done ? 'concluida' : (late ? 'atrasada' : (at.status||'pendente'));
      const resp  = at.responsavelId || selPb.donoId || '';
      let slaTxt  = '';
      if (late)      slaTxt = `<span style="font-size:9px;background:#FFF5F5;color:var(--red);border-radius:4px;padding:1px 5px;font-weight:700">${Math.abs(diasR)}d atrás</span>`;
      else if (prox) slaTxt = `<span style="font-size:9px;background:#FFFFF0;color:var(--yellow);border-radius:4px;padding:1px 5px;font-weight:700">${diasR}d</span>`;
      return `<div class="at-row-new" onclick="openAtividade('${c.id}','${selPb.id}','${at.id}')">
        <div class="at-checkbox${done?' done':''}">${done?'✓':''}</div>
        <span class="at-row-name${done?' done':''}">${at.nome}</span>
        <div class="at-row-right">
          ${slaTxt}
          ${resp ? '<span class="at-row-resp">'+resp+'</span>' : ''}
          <span class="at-status-${st}">${stLbl[st]||st}</span>
        </div>
      </div>`;
    }).join('');

    const addFormHtml = _at_form_pb === selPb.id
      ? `<div class="pb-inline-form" style="padding:10px 20px;flex-shrink:0">
          <input class="pb-inline-input" id="at-nome-input-${selPb.id}" placeholder="Nome da atividade..." onkeydown="if(event.key==='Enter')criarAtividade('${selPb.id}','${c.id}')" style="flex:1">
          <input type="number" id="at-sla-input-${selPb.id}" value="15" min="1" max="365" style="width:52px;padding:6px 6px;border:1px solid var(--border);border-radius:6px;font-size:12px" title="Prazo em dias">
          <span style="font-size:11px;color:var(--text3);white-space:nowrap">dias</span>
          <button class="btn btn-primary btn-sm" onclick="criarAtividade('${selPb.id}','${c.id}')">Criar</button>
          <button class="btn btn-sm" onclick="cancelarFormAtividade('${c.id}')">✕</button>
         </div>` : '';

    rightHtml = `
      <div class="at-right-hd">
        <div class="at-right-title">${selPb.nome}</div>
        ${selPb.encerrado
          ? '<span style="font-size:10px;padding:3px 8px;background:var(--border-2);color:var(--text3);border-radius:6px">Encerrado</span>'
          : '<button class="btn btn-primary btn-sm" onclick="abrirFormAtividade(\''+selPb.id+'\',\''+c.id+'\')">+ Atividade</button>'}
      </div>
      ${rowsHtml}
      ${addFormHtml}
      ${!ativs.length && !addFormHtml ? '<div class="at-empty" style="height:200px"><div style="font-size:28px">📋</div><div>Nenhuma atividade.<br>Adicione a primeira acima.</div></div>' : ''}`;
  }

  return `<div class="at-cols">
    <div class="at-left-col">${leftHtml}</div>
    <div class="at-right-col">${rightHtml}</div>
  </div>`;
}

function toggleAtivPlaybook(pbId, clienteId) {
  _pb_expandidos[pbId] = !_pb_expandidos[pbId];
  renderCliente(clienteId);
}

function selecionarAtividade(pbId, atId, clienteId) {
  _pb_expandidos[pbId] = true;
  _at_sel = atId;
  renderCliente(clienteId);
}

function selecionarPb(pbId, clienteId) {
  _pb_sel_id  = pbId;
  _at_form_pb = null;
  renderCliente(clienteId);
}

function abrirFormPlaybook(clienteId) {
  _pb_form_open = true;
  renderCliente(clienteId);
}

function cancelarFormPlaybook(clienteId) {
  _pb_form_open = false;
  renderCliente(clienteId);
}

function abrirFormAtividade(pbId, clienteId) {
  _at_form_pb = pbId;
  renderCliente(clienteId);
}

function cancelarFormAtividade(clienteId) {
  _at_form_pb = null;
  renderCliente(clienteId);
}

function criarAtivPlaybook(clienteId) {
  const input = document.getElementById('pb-nome-input');
  const nome  = input?.value?.trim();
  if (!nome) return;
  const c  = getCliente(clienteId);
  const id = 'pb_' + Date.now();
  c.ativPlaybooks = c.ativPlaybooks || [];
  c.ativPlaybooks.push({id, nome, donoId: getConsultorAtivo(), criadoEm: new Date().toISOString(), atividades: []});
  saveCliente(c);
  _pb_form_open = false;
  _pb_sel_id    = id;
  renderCliente(clienteId);
}

function criarAtividade(pbId, clienteId) {
  const input    = document.getElementById('at-nome-input-' + pbId);
  const slaInput = document.getElementById('at-sla-input-' + pbId);
  const nome     = input?.value?.trim();
  if (!nome) return;
  const c  = getCliente(clienteId);
  const pb = (c.ativPlaybooks || []).find(p => p.id === pbId);
  if (!pb) return;
  const slasDias  = parseInt(slaInput?.value || '15', 10) || 15;
  const hoje      = new Date();
  const dl        = new Date(hoje); dl.setDate(dl.getDate() + slasDias);
  const dataLimite = dl.toISOString().split('T')[0];
  const criadoEm  = hoje.toISOString();
  const id = 'at_' + Date.now();
  pb.atividades.push({id, nome, slasDias, dataLimite, criadoEm, status:'pendente', registros: [], checklist: [], anotacoes: []});
  saveCliente(c);
  _at_form_pb = null;
  renderCliente(clienteId);
  openAtividade(clienteId, pbId, id);
}

function addRegistroAtividade(clienteId, pbId, atId) {
  const ta    = document.getElementById('at-reg-input');
  const texto = ta?.value?.trim();
  if (!texto) return;
  const c     = getCliente(clienteId);
  const pb    = (c.ativPlaybooks || []).find(p => p.id === pbId);
  if (!pb) return;
  const at    = pb.atividades.find(a => a.id === atId);
  if (!at) return;
  const ativo = getConsultorAtivo();
  const autor = getConsultores().find(x => x.id === ativo)?.nome || 'Consultor';
  at.registros.unshift({id:'reg_'+Date.now(), autor, data: new Date().toISOString(), texto});
  saveCliente(c);
  renderCliente(clienteId);
}

let _ov_cId = null, _ov_pbId = null, _ov_atId = null;

function openAtividade(cId, pbId, atId) {
  _ov_cId = cId; _ov_pbId = pbId; _ov_atId = atId;
  const c  = getCliente(cId);
  const pb = (c?.ativPlaybooks || []).find(p => p.id === pbId);
  const at = (pb?.atividades || []).find(a => a.id === atId);
  if (!at) return;

  document.getElementById('ov-titulo').textContent = at.nome || at.titulo || '—';

  const stBg  = {concluida:'var(--b-green-bg)',atrasada:'var(--b-red-bg)',pendente:'var(--border-2)',em_andamento:'var(--b-blue-bg)'};
  const stClr = {concluida:'var(--green)',atrasada:'var(--red)',pendente:'var(--text3)',em_andamento:'var(--blue)'};
  const stLbl = {concluida:'Concluída',atrasada:'Atrasada',pendente:'Pendente',em_andamento:'Em andamento'};
  const resp  = at.responsavelId || pb.donoId || '?';
  const st    = at.status || 'pendente';

  document.getElementById('ov-meta').innerHTML =
    '<span style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2)">' +
      '<span style="width:20px;height:20px;border-radius:5px;background:linear-gradient(135deg,var(--primary),#ff8c5a);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff">' +
        resp[0].toUpperCase() +
      '</span>' +
      resp +
    '</span>' +
    '<span class="status-badge" style="background:' + (stBg[st]||'var(--border-2)') + ';color:' + (stClr[st]||'var(--text3)') + '">' +
      (stLbl[st]||st) +
    '</span>';

  // Datas de início e fim
  const diInput = document.getElementById('ov-data-inicio');
  const dfInput = document.getElementById('ov-data-fim');
  if (diInput) diInput.value = at.dataInicio ? at.dataInicio.split('T')[0] : '';
  if (dfInput) dfInput.value = at.dataLimite ? at.dataLimite.split('T')[0] : '';

  // Botão Concluir
  const btnC = document.getElementById('ov-btn-concluir');
  if (btnC) {
    if (at.status === 'concluida') {
      btnC.textContent = '✓ Concluída';
      btnC.classList.add('done');
      btnC.onclick = null;
    } else {
      btnC.textContent = '✓ Marcar como Concluída';
      btnC.classList.remove('done');
      btnC.onclick = concluirAtividade;
    }
  }

  const dlWrap = document.getElementById('ov-deadline-wrap');
  const dlSpan = document.getElementById('ov-deadline');
  if (dlWrap && dlSpan) {
    if (at.dataLimite && at.status !== 'concluida') {
      const hoje2 = new Date(); hoje2.setHours(0,0,0,0);
      const dlDate = new Date(at.dataLimite + 'T00:00:00');
      const diffMs = dlDate - hoje2;
      const diffD  = Math.round(diffMs / 86400000);
      const ddmm   = dlDate.toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit'});
      if (diffD < 0) {
        dlSpan.innerHTML = '<span style="color:var(--red)">⏰ Vencida há ' + Math.abs(diffD) + ' dia' + (Math.abs(diffD)!==1?'s':'') + ' · ' + ddmm + '</span>';
      } else if (diffD === 0) {
        dlSpan.innerHTML = '<span style="color:#d69e2e">⚠️ Vence hoje · ' + ddmm + '</span>';
      } else if (diffD <= 7) {
        dlSpan.innerHTML = '<span style="color:#d69e2e">⚠️ Vence em ' + diffD + ' dia' + (diffD!==1?'s':'') + ' · ' + ddmm + '</span>';
      } else {
        dlSpan.innerHTML = '<span style="color:var(--text3)">📅 Prazo: ' + ddmm + ' (' + diffD + ' dias)</span>';
      }
      dlWrap.style.display = '';
    } else {
      dlWrap.style.display = 'none';
    }
  }

  document.querySelectorAll('.ov-tab').forEach(function(t, i) { t.classList.toggle('active', i === 0); });
  renderOverlayTab('registro');
  document.getElementById('ov-backdrop').classList.add('open');
  document.getElementById('ov-panel').classList.add('open');
}

function closeAtividade() {
  document.getElementById('ov-backdrop').classList.remove('open');
  document.getElementById('ov-panel').classList.remove('open');
  _ov_cId = _ov_pbId = _ov_atId = null;
}

function setOverlayTab(tab, el) {
  document.querySelectorAll('.ov-tab').forEach(function(t) { t.classList.remove('active'); });
  if (el) el.classList.add('active');

}

function renderOverlayTab(tab) {
  const body = document.getElementById('ov-body');
  if (!body) return;
  if (tab === 'registro')  body.innerHTML = renderOvRegistro();
  if (tab === 'checklist') body.innerHTML = renderOvChecklist();
  if (tab === 'anotacao')  body.innerHTML = renderOvAnotacao();

function _getOvAt() {

function concluirAtividade() {
  const { c, pb, at } = _getOvAt();
  if (!at || at.status === 'concluida') return;
  at.status = 'concluida';
  at.dataConclusao = new Date().toISOString();
  if (!at.registros) at.registros = [];
  const ativo = getConsultorAtivo();
  const cons  = getConsultores().find(function(x) { return x.id === ativo; });
  const autor = cons?.nome || ativo;
  at.registros.unshift({ id:'reg_'+Date.now(), tipo:'evento', texto: autor + ' marcou como Concluída', data: new Date().toISOString() });
  saveCliente(c);
  // Atualiza a tela de fundo (progresso do playbook)
  if (typeof renderCliente === 'function') renderCliente(_ov_cId);

  openAtividade(_ov_cId, _ov_pbId, _ov_atId);

      '<span class="ov-cl-lbl' + (item.done ? ' done' : '') + '">' + item.texto + '</span>' +

    '<div style="width:100%;height:4px;background:var(--border);border-radius:2px;margin-bottom:16px;overflow:hidden">' +
      '<div style="width:' + pct + '%;height:100%;background:var(--green);border-radius:2px"></div>' +

function checkImplantacaoConcluida(clienteId) {
  const c = getCliente(clienteId);
  if (!c || c.status === 'cs_ativo') return;
  const cid     = getConsultorAtivo();
  const pbsImpl = (c.ativPlaybooks || []).filter(function(pb) { return pb.fase === 'implantacao' && pb.donoId === cid; });
  if (!pbsImpl.length) return;
  const todas = pbsImpl.flatMap(function(pb) { return pb.atividades || []; });
  if (!todas.length || !todas.every(function(a) { return a.status === 'concluida'; })) return;

  showToast(
    '🎉 Implantação concluída! ' +
    '<button onclick="confirmarCSAtivo(\'' + clienteId + '\')" ' +
    'style="margin-left:8px;padding:3px 10px;background:#fff;color:var(--green);border:none;border-radius:6px;font-weight:700;cursor:pointer;font-size:11px">Mover para CS Ativo</button>',
    7000
  );
}

function confirmarCSAtivo(clienteId) {
  const c = getCliente(clienteId);
  if (!c) return;
  c.status       = 'cs_ativo';
  c.dataInicioCS = new Date().toISOString();
  if (!c.historicoEtapas) c.historicoEtapas = [];
  c.historicoEtapas.push({
    etapa: 'cs_ativo', autor: getConsultorAtivo(),
    data:  new Date().toISOString(), tipo: 'evento',
    texto: 'Implantação encerrada — cliente movido para CS Ativo',
  });
  (c.ativPlaybooks || []).forEach(function(pb) {
    if (pb.fase === 'implantacao') pb.encerrado = true;
  });
  saveCliente(c);
  showToast('✅ ' + (c.id || clienteId) + ' agora está em CS Ativo!', 3000);
  if (_cliente_id_atual === clienteId) renderCliente(clienteId);
  else renderCarteira();
}

function checkTask(clienteId, faseIdx, tarefaId) {
  const c = getCliente(clienteId);
  const t = c.fases[faseIdx].tarefas.find(x => x.id === tarefaId);
  if (!t) return;
  t.feita = !t.feita;
  saveCliente(c);

  const prog = getProgresso(c);
  const bar  = document.getElementById('prog-bar-' + clienteId);
  const pct  = document.getElementById('prog-pct-' + clienteId);
  if (bar) bar.style.width = prog + '%';
  if (pct) pct.textContent = prog + '%';

  const item = document.getElementById('ti_' + tarefaId);
  if (item) { t.feita ? item.classList.add('done') : item.classList.remove('done'); }

  // auto-advance check — only when checking, not unchecking
  if (t.feita) {
    const fase = c.fases[faseIdx];
    const faseCompleta = fase.tarefas.every(function(x){ return x.feita; });
    if (faseCompleta) {
      const prevComplete = c.fases.slice(0, faseIdx).every(function(f){ return f.tarefas.every(function(x){ return x.feita; }); });
      if (prevComplete) {
        const nextEtapa = FASE_ADVANCE[faseIdx];
        if (nextEtapa === null) {
          showToast('🎉 Projeto concluído! Todas as fases foram concluídas.');
        } else {
          const gateEtapa = FASE_ETAPA_GATE[faseIdx];
          if (c.etapa === gateEtapa) {
            const cFresh = getCliente(clienteId);
            cFresh.historicoEtapas.push({
              de: gateEtapa, para: nextEtapa,
              data: new Date().toISOString(),
              motivo: 'Avanço automático por conclusão de fase'
            });
            cFresh.etapa = nextEtapa;
            saveCliente(cFresh);
            showToast('⚡ ' + clienteId + ' avançou para ' + nextEtapa);
            renderCliente(clienteId);
          }
        }
      }
    }
    checkImplantacaoConcluida(clienteId);
  }
}

function addRegistro(clienteId) {
  const ta    = document.getElementById('reg-input-' + clienteId);
  const texto = ta?.value?.trim();
  if (!texto) return;

  const c     = getCliente(clienteId);
  const ativo = getConsultorAtivo();
  const nome  = getConsultores().find(x => x.id === ativo)?.nome || ativo;

  c.registros.unshift({id:'r'+Date.now(), autor:nome, data:new Date().toISOString(), texto});
  saveCliente(c);
  ta.value = '';

  const regsEl = document.getElementById('regs-' + clienteId);
  if (regsEl) {
    regsEl.innerHTML = c.registros.map(r => `
      <div class="reg-item">
        <div class="reg-meta"><strong>${r.autor}</strong> · ${fmtDateTime(r.data)}</div>
        <div class="reg-text">${r.texto}</div>
      </div>`).join('');
  }
}

// ─── Modal Alterar Etapa ────────────────────────────────────
let _modal_cliente_id       = null;
let _modal_return_to_kanban = false;

function openModal(clienteId, dragDestEtapa) {
  _modal_cliente_id       = clienteId;
  _modal_return_to_kanban = !!dragDestEtapa;

  const c   = getCliente(clienteId);
  const sel = document.getElementById('modal-etapa-sel');

  sel.innerHTML = ETAPAS.filter(e => e !== c.etapa)
    .map(e => `<option value="${e}"${e===dragDestEtapa?' selected':''}>${ETAPA_META[e].emoji} ${e}</option>`)
    .join('');
  sel.disabled = !!dragDestEtapa;

  const motivo = document.getElementById('modal-motivo');
  motivo.value = '';
  document.getElementById('modal-save-btn').disabled = true;
  motivo.oninput = function() {
    document.getElementById('modal-save-btn').disabled = !motivo.value.trim();
  };
  document.getElementById('modal-etapa').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('modal-etapa-sel').disabled = false;
  document.getElementById('modal-etapa').classList.add('hidden');
  _modal_cliente_id       = null;
  _modal_return_to_kanban = false;
}

function saveEtapa() {
  const novaEtapa = document.getElementById('modal-etapa-sel').value;
  const motivo    = document.getElementById('modal-motivo').value.trim();
  if (!motivo || !_modal_cliente_id) return;

  const c = getCliente(_modal_cliente_id);
  c.historicoEtapas.push({de:c.etapa, para:novaEtapa, data:new Date().toISOString(), motivo});
  c.etapa = novaEtapa;
  saveCliente(c);

  const savedId    = _modal_cliente_id;
  const toKanban   = _modal_return_to_kanban;
  closeModal();

  if (toKanban) renderCarteira();
  else          renderCliente(savedId);
}

document.getElementById('modal-etapa').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

let _bFases          = null;

    nome: f.nome,

  _criar_projeto = id ? (getProjetosPendentes().find(p => p.id === id) || null) : null;

              <label>Etapa inicial</label>
              <select id="f-etapa">
                ${ETAPAS.map(e => `<option value="${e}">${ETAPA_META[e].emoji} ${e}</option>`).join('')}
              </select>
            </div>
            <div class="form-group">
              <label>Data início</label>
              <input type="date" id="f-inicio">
            </div>
            <div class="form-group">
              <label>Prazo final</label>
              <input type="date" id="f-prazo">
            </div>
            <div class="form-group full">
              <label>Próxima ação</label>
              <input type="text" id="f-acao" placeholder="Ex: Agendar reunião de kickoff">
            </div>
          </div>` : ''}
        <div style="margin-top:14px">
          <button class="btn btn-secondary btn-sm" onclick="entrarModoManual()">+ Criar novo projeto</button>
        </div>
      </div>`;
  } else {
    clienteSection = `
      <div class="card-block" style="max-width:760px">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
          <div class="section-title" style="margin-bottom:0">Dados do cliente</div>
          ${!forceManual ? `<button class="btn btn-secondary btn-sm" onclick="voltarSelecao()">← Selecionar projeto existente</button>` : ''}
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label>Nome do cliente <span class="form-req">*</span></label>
            <input type="text" id="f-nome" placeholder="Ex: ACME LTDA">
          </div>
          <div class="form-group">
            <label>ID do cliente <span class="form-req">*</span></label>
            <input type="text" id="f-id" placeholder="Ex: ACME" style="text-transform:uppercase"
              oninput="this.value=this.value.toUpperCase()">
          </div>
          <div class="form-group">
            <label>Projeto SAGP <span class="form-req">*</span></label>
            <input type="text" id="f-projeto" placeholder="Ex: SAGP-00150"
              oninput="this.value=this.value.toUpperCase()">
          </div>
          <div class="form-group">
            <label>Produto</label>
            <select id="f-produto">
              <option>CPS</option><option>IOT</option>
              <option>Portal da Cotação</option><option>GRV Connect</option>
            </select>
          </div>
          <div class="form-group">
            <label>Consultor responsável</label>
            <select id="f-consultor">
              ${consultores.map(c => `<option value="${c.id}"${c.id===ativo?' selected':''}>${c.nome}</option>`).join('')}
            </select>
          </div>
          <div class="form-group">
            <label>Etapa inicial</label>
            <select id="f-etapa">
              ${ETAPAS.map(e => `<option value="${e}">${ETAPA_META[e].emoji} ${e}</option>`).join('')}
            </select>
          </div>
          <div class="form-group">
            <label>Data início</label>
            <input type="date" id="f-inicio">
          </div>
          <div class="form-group">
            <label>Prazo final</label>
            <input type="date" id="f-prazo">
          </div>
          <div class="form-group full">
            <label>Próxima ação</label>
            <input type="text" id="f-acao" placeholder="Ex: Agendar reunião de kickoff">
          </div>
          <div class="form-group full">
            <label>Observações</label>
            <textarea id="f-obs" rows="3"></textarea>
          </div>
        </div>
      </div>`;
  }

  sec.innerHTML = `
    <div class="page-header">
      <div class="page-title">Criar Playbook</div>
      <div class="page-subtitle">Cadastre um novo cliente e monte o playbook de implantação</div>
    </div>
    ${clienteSection}
    <div class="card-block" style="max-width:760px;margin-top:16px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">
        <div class="section-title" style="margin-bottom:0">Tarefas do playbook</div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-secondary btn-sm" onclick="usarTemplate()">📋 Usar template padrão</button>
          <button class="btn btn-secondary btn-sm" onclick="limparBuilder()">🗑️ Limpar</button>
        </div>
      </div>
      <div class="ptabs" id="ptabs">
        ${_bFases.map((f,i) => `<button class="ptab${i===_bTab?' active':''}" onclick="switchTab(${i})">${f.nome}</button>`).join('')}
      </div>
      <div id="builder-content">${renderBuilderTab(_bTab)}</div>
    </div>
    <div style="max-width:760px;margin-top:16px;display:flex;gap:10px">
      <button class="btn btn-primary" onclick="salvarPlaybook()">💾 Salvar playbook</button>
      <button class="btn btn-secondary" onclick="navigate('carteira')">Cancelar</button>
    </div>
    <div id="criar-err" class="err-msg" style="max-width:760px"></div>`;
}

function renderBuilderTab(idx) {
  const fase = _bFases[idx];
  const list = fase.tarefas.length
    ? fase.tarefas.map(t => `
      <div class="tb-item" id="tbi_${t.id}">
        <span class="tb-text">${t.texto}</span>
        <button class="tb-rm" onclick="rmTarefa(${idx},'${t.id}')">✕</button>
      </div>`).join('')
    : `<div style="color:var(--text3);font-size:13px;padding:4px 0">Nenhuma tarefa. Adicione abaixo.</div>`;
  return `
    <div class="tb-list">${list}</div>
    <div class="tb-add-row">
      <input type="text" id="tb-inp-${idx}" placeholder="Nova tarefa..."
        onkeydown="if(event.key==='Enter'){event.preventDefault();addTarefa(${idx})}">
      <button class="btn btn-secondary btn-sm" onclick="addTarefa(${idx})">+ Tarefa</button>
    </div>`;
}

function switchTab(idx) {
  _bTab = idx;
  document.querySelectorAll('.ptab').forEach((t,i) => t.classList.toggle('active', i===idx));
  document.getElementById('builder-content').innerHTML = renderBuilderTab(idx);
}

function addTarefa(faseIdx) {
  const inp   = document.getElementById('tb-inp-' + faseIdx);
  const texto = inp?.value?.trim();
  if (!texto) return;
  _bFases[faseIdx].tarefas.push({id:'nb_'+Date.now(), texto, feita:false});
  inp.value = '';
  document.getElementById('builder-content').innerHTML = renderBuilderTab(faseIdx);
  document.getElementById('tb-inp-' + faseIdx)?.focus();
}

function rmTarefa(faseIdx, tarefaId) {
  _bFases[faseIdx].tarefas = _bFases[faseIdx].tarefas.filter(t => t.id !== tarefaId);
  document.getElementById('builder-content').innerHTML = renderBuilderTab(faseIdx);
}

function usarTemplate()  { initBFases(); document.getElementById('builder-content').innerHTML = renderBuilderTab(_bTab); }
function limparBuilder() { _bFases = TEMPLATE_FASES.map(f => ({nome:f.nome, tarefas:[]})); document.getElementById('builder-content').innerHTML = renderBuilderTab(_bTab); }

function salvarPlaybook() {
  const errEl = document.getElementById('criar-err');
  const pendentes = getProjetosPendentes();
  const forceManual = pendentes.length === 0;
  const useSelector = !_criar_manual && !forceManual && _criar_projeto;

  let id, projeto, produto, consul, etapa, inicio, prazo, acao;

  if (useSelector) {
    const p = _criar_projeto;
    id      = p.id;
    projeto = p.projeto;
    produto = p.produto;
    consul  = p.consultorId;
    etapa   = document.getElementById('f-etapa')?.value;
    inicio  = document.getElementById('f-inicio')?.value;
    prazo   = document.getElementById('f-prazo')?.value || null;
    acao    = document.getElementById('f-acao')?.value?.trim();
    if (!etapa) {
      errEl.textContent = 'Selecione a etapa inicial.';
      errEl.style.display = 'block';
      return;
    }
  } else {
    const nome = document.getElementById('f-nome')?.value?.trim();
    id      = document.getElementById('f-id')?.value?.trim().toUpperCase();
    projeto = document.getElementById('f-projeto')?.value?.trim().toUpperCase();
    produto = document.getElementById('f-produto')?.value;
    consul  = document.getElementById('f-consultor')?.value;
    etapa   = document.getElementById('f-etapa')?.value;
    inicio  = document.getElementById('f-inicio')?.value;
    prazo   = document.getElementById('f-prazo')?.value || null;
    acao    = document.getElementById('f-acao')?.value?.trim();
    if (!nome || !id || !projeto) {
      errEl.textContent = 'Preencha obrigatoriamente: Nome, ID e Projeto SAGP.';
      errEl.style.display = 'block';
      return;
    }
  }

  if (getCliente(id)) {
    errEl.textContent = 'Já existe um cliente com ID "' + id + '". Escolha outro ID.';
    errEl.style.display = 'block';
    return;
  }
  errEl.style.display = 'none';

  const dataInicio = inicio || new Date().toISOString().split('T')[0];
  const novo = {
    id, projeto, produto, consultorId: consul, etapa,
    dataInicio, prazo,
    proximaAcao: acao || '',
    fases: _bFases.map(f => ({nome:f.nome, tarefas:f.tarefas.map(t => ({...t, feita:false}))})),
    registros: [],
    historicoEtapas: [{de:null, para:etapa, data:dataInicio+'T09:00:00', motivo:'Início do projeto'}],
  };

  saveCliente(novo);
  if (useSelector) removeProjetoPendente(id);

  _bFases        = null;
  _bTab          = 0;
  _criar_projeto = null;
  _criar_manual  = false;
  navigate('cliente/' + encodeURIComponent(id));
}
</script>
</body>
</html>
